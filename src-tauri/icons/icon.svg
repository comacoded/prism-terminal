<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- macOS squircle-ish rounded rect -->
    <clipPath id="squircle">
      <rect x="100" y="100" width="824" height="824" rx="186" ry="186"/>
    </clipPath>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16171d"/>
      <stop offset="0.55" stop-color="#0b0c10"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.2" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <!-- spectrum fan gradients (Siri palette) -->
    <linearGradient id="ray1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6778" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff6778" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffba71" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffba71" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5f0a8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#f5f0a8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8d9fff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#8d9fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#bc82f3" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#bc82f3" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.75" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="prismFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#c3d2f6" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="soften" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- glass body -->
    <rect x="100" y="100" width="824" height="824" fill="url(#glass)"/>

    <!-- incoming beam from lower-left to the prism's left face -->
    <g>
      <polygon points="150,760 552,538 552,562 150,788" fill="url(#beam)" filter="url(#soften)"/>
    </g>

    <!-- refracted spectrum fan exiting the right face -->
    <g filter="url(#glow)" opacity="0.85">
      <polygon points="560,520 940,300 940,420 560,540" fill="url(#ray1)"/>
      <polygon points="560,530 940,430 940,510 560,548" fill="url(#ray2)"/>
      <polygon points="560,540 940,520 940,590 560,556" fill="url(#ray3)"/>
      <polygon points="560,548 940,600 940,690 560,564" fill="url(#ray4)"/>
      <polygon points="560,556 940,700 940,810 560,572" fill="url(#ray5)"/>
    </g>
    <g opacity="0.95">
      <polygon points="560,520 940,300 940,420 560,540" fill="url(#ray1)"/>
      <polygon points="560,530 940,430 940,510 560,548" fill="url(#ray2)"/>
      <polygon points="560,540 940,520 940,590 560,556" fill="url(#ray3)"/>
      <polygon points="560,548 940,600 940,690 560,564" fill="url(#ray4)"/>
      <polygon points="560,556 940,700 940,810 560,572" fill="url(#ray5)"/>
    </g>

    <!-- the prism: equilateral-ish triangle, glassy fill, crisp edges -->
    <g>
      <polygon points="512,330 668,610 356,610" fill="url(#prismFace)"/>
      <polygon points="512,330 668,610 356,610" fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="10" stroke-linejoin="round"/>
      <!-- inner facet line -->
      <line x1="512" y1="330" x2="512" y2="610" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6"/>
    </g>

    <!-- top edge light -->
    <rect x="100" y="100" width="824" height="824" rx="186" ry="186" fill="none" stroke="url(#edge)" stroke-width="6"/>
  </g>
</svg>
